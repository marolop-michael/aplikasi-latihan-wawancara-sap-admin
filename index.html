    <script>
        const data = [
            { 
                short: "1. Perkenalan Diri", 
                cat: "HR Interview", 
                q: "Dapatkah Anda memperkenalkan diri Anda secara singkat, jelas, dan relevan dengan posisi yang Anda lamar?", 
                a: "Selamat pagi, terima kasih atas kesempatannya.\nPerkenalkan, saya lulusan S1 Matematika dari Universitas Negeri Yogyakarta.\nDalam pengalaman saya saat menjalani internship di Bank BTN, saya terbiasa menangani data operasional dalam jumlah cukup besar dengan tanggung jawab memastikan data tersebut akurat sebelum digunakan oleh tim.\nSaya melakukan validasi, pengecekan konsistensi, serta menyusun data agar lebih terstruktur untuk kebutuhan operasional dan pelaporan.\nDengan pendekatan tersebut, data yang saya kelola dapat digunakan secara konsisten tanpa menimbulkan kendala dalam proses kerja tim.", 
                time: "30-45s" 
            },
            { 
                short: "2. Alasan Melamar", 
                cat: "HR Interview", 
                q: "Apa alasan Anda tertarik melamar posisi SAP Admin ini?", 
                a: "Saya tertarik karena posisi ini berfokus pada pengelolaan data operasional yang menjadi dasar proses produksi dan stok.\nDalam pengalaman saya, saya terbiasa memastikan data tidak hanya tersedia, tetapi juga akurat sebelum digunakan.\nSaya melakukan validasi dan cross-check untuk meminimalkan kesalahan.\nDengan cara itu, saya melihat cara kerja saya relevan dengan kebutuhan posisi ini yang menuntut akurasi dan konsistensi data.", 
                time: "30-45s" 
            },
            { 
                short: "3. Kenapa Pilih Anda?", 
                cat: "HR Interview", 
                q: "Mengapa kami harus memilih Anda dibandingkan kandidat lain?", 
                a: "Dalam pengalaman saya, saya terbiasa mengelola data operasional dan memastikan akurasinya sebelum digunakan oleh tim.\nSaya tidak hanya melakukan input, tetapi juga melakukan validasi dan pengecekan untuk memastikan data benar.\nSaya juga bekerja secara sistematis untuk menjaga konsistensi data.\nDengan cara itu, saya dapat berkontribusi dalam menjaga kelancaran operasional yang bergantung pada data yang akurat.", 
                time: "45s" 
            },
            { 
                short: "4. Kelebihan Utama", 
                cat: "HR Interview", 
                q: "Apa kelebihan utama Anda yang paling relevan untuk posisi ini?", 
                a: "Kelebihan utama saya adalah ketelitian dalam mengelola data operasional.\nDalam pengalaman saya, saya memastikan data sudah melalui proses pengecekan sebelum digunakan.\nSaya juga menjaga struktur data agar tetap rapi dan mudah dipahami.\nDengan cara itu, data dapat digunakan secara konsisten tanpa menimbulkan kesalahan dalam proses berikutnya.", 
                time: "30s" 
            },
            { 
                short: "5. Kelemahan", 
                cat: "HR Interview", 
                q: "Apa kelemahan Anda dan bagaimana Anda mengatasinya?", 
                a: "Saya cenderung cukup detail dalam melakukan pengecekan data.\nHal tersebut terkadang membuat proses validasi memakan waktu lebih lama.\nNamun saya mengatasinya dengan menetapkan batas waktu kerja agar tetap efisien.\nDengan cara itu, saya tetap menjaga kualitas tanpa menghambat penyelesaian pekerjaan.",

            { 
                short: "6. Kerja Repetitif", 
                cat: "HR Interview",

                time: "45s" 
            },
            { 
                short: "7. Kontribusi Cepat", 
                cat: "HR Interview", 
                q: "Apa kontribusi yang bisa langsung Anda berikan jika diterima?",

                time: "45s" 
            },
            { 
                short: "8. Akurasi Data",

                time: "60s" 
            },
            { 
                short: "9. Kesalahan Data", 
                cat: "Behavioral", 
                q: "Ceritakan situasi ketika Anda menemukan kesalahan dalam data dan bagaimana Anda menanganinya.",

                time: "60s"

            {

                time: "45s" 
            },
            { 
                short: "11. Kerja Tim", 
                cat: "Behavioral", 
                q: "Ceritakan pengalaman Anda bekerja dalam tim.", 
                a: "Saya bekerja sama dengan tim dalam mendukung kebutuhan data operasional.\nPeran saya memastikan data yang saya berikan sudah akurat and siap digunakan.\nSaya menjaga komunikasi untuk memastikan tidak terjadi kesalahan pemahaman.\nDengan cara itu, pekerjaan tim berjalan lebih lancar dan terkoordinasi.", 
                time: "45s" 
            },
            { 
                short: "12. Metode Akurasi", 
                cat: "User/Technical",

                a: "Saya memastikan akurasi dimulai dari sumber data.\nSaya melakukan validasi awal untuk mengecek konsistensi dan menghindari duplikasi.\nKemudian saya melakukan cross-check sebelum data digunakan.\nDengan cara itu, data dapat digunakan secara konsisten dan meminimalkan kesalahan.", 
                time: "60s" 
            },
            { 
                short: "13. SAP vs Fisik", 
                cat: "User/Technical", 
                q: "Apa yang Anda lakukan jika data SAP tidak sesuai dengan stok fisik?", 
                a: "Saya melakukan verifikasi data di sistem untuk memastikan tidak ada kesalahan input.\nKemudian saya melakukan cross-check dengan dokumen seperti laporan produksi.\nJika masih terdapat selisih, saya berkoordinasi dengan tim lapangan.\nSetelah penyebabnya jelas, saya melakukan penyesuaian agar data kembali akurat.", 
                time: "60s" 
            },
            { 
                short: "14. Data Dinamis", 
                cat: "User/Technical", 
                q: "Bagaimana Anda menangani data yang berubah-ubah?",

                time: "45s" 
            },
            { 
                short: "15. Salah Input", 
                cat: "User/Technical", 
                q: "Apa yang Anda lakukan jika data yang Anda input salah dan sudah digunakan oleh tim?", 
                a: "Saya segera menginformasikan kepada tim untuk tidak menggunakan data tersebut.\nSaya melakukan verifikasi ulang untuk memastikan data yang benar.\nKemudian saya melakukan koreksi dan menginformasikan pembaruan.\nDengan cara itu, dampak kesalahan dapat diminimalkan.", 
                time: "45s" 
            },
            { 
                short: "16. Data Pending", 
                cat: "User/Technical", 
                q: "Bagaimana jika deadline dekat tetapi data belum lengkap?", 
                a: "Saya mulai bekerja dengan data yang sudah tersedia.\nData yang belum lengkap saya tandai sebagai sementara.\nSaya tetap berkomunikasi dengan pihak terkait untuk melengkapi data.\nDengan cara itu, pekerjaan tetap berjalan tanpa mengorbankan kejelasan.", 
                time: "45s" 
            },
            { 
                short: "17. Duplikasi", 
                cat: "Extended", 
                q: "Bagaimana Anda menangani data duplikat?", 
                a: "Saya mengidentifikasi data duplikat dengan membandingkannya ke sumber data.\nSaya memastikan data yang benar dipertahankan dan duplikat diperbaiki.\nSaya juga menambahkan validasi untuk mencegah hal tersebut terjadi lagi.\nDengan cara itu, data tetap bersih dan konsisten.", 
                time: "45s" 
            },
            { 
                short: "18. Ragu Data", 
                cat: "Extended", 
                q: "Apa yang Anda lakukan jika Anda tidak yakin dengan data?", 
                a: "Saya tidak langsung menggunakan data tersebut.\nSaya melakukan verifikasi dengan dokumen pendukung.\nJika perlu, saya konfirmasi ke pihak terkait.\nSetelah data jelas, baru saya gunakan agar tidak menimbulkan kesalahan.", 
                time: "45s" 
            },
            { 
                short: "19. Dampak Kerja", 
                cat: "Extended", 
                q: "Bagaimana memastikan pekerjaan Anda tidak berdampak negatif ke tim lain?", 
                a: "Saya memastikan data sudah melalui proses validasi sebelum digunakan.\nSaya melakukan pengecekan ulang dan konfirmasi jika diperlukan.\nSaya hanya memberikan data yang sudah jelas and akurat.\nDengan cara itu, pekerjaan saya aman digunakan oleh tim lain.", 
                time: "45s" 
            },
            { 
                short: "20. Luar Jobdesk", 
                cat: "Extended", 
                q: "Apa yang Anda lakukan jika diminta mengerjakan tugas di luar jobdesk?", 
                a: "Saya akan memahami terlebih dahulu kebutuhan tugas tersebut.\nSaya mencoba menyelesaikan sesuai kemampuan saya.\nJika ada hal yang belum saya kuasai, saya akan mempelajarinya.\nDengan cara itu, saya tetap dapat berkontribusi tanpa mengganggu pekerjaan utama.", 
                time: "45s" 
            },
            { 
                short: "21. Belum Ada SAP", 
                cat: "Gap Handling", 
                q: "Bagaimana Anda menjawab jika belum memiliki pengalaman menggunakan SAP?", 
                a: "Saya memahami bahwa saya belum memiliki pengalaman langsung menggunakan SAP.\nNamun saya sudah terbiasa mengelola data operasional dengan prinsip akurasi dan validasi.\nSaya melihat perbedaan utama ada pada tools.\nDengan dasar tersebut, saya siap mempelajari SAP dan beradaptasi dengan cepat.", 
                time: "60s" 
            },
            { 
                short: "22. Background", 
                cat: "Gap Handling", 
                q: "Mengapa latar belakang Anda bukan dari supply chain atau IT?", 
                a: "Saya berasal dari Matematika, namun pengalaman saya berkaitan dengan pengelolaan data operasional.\nSaya terbiasa memastikan data akurat sebelum digunakan.\nSaya melihat inti pekerjaan ini adalah akurasi data.\nDengan dasar tersebut, saya siap mempelajari aspek teknis lainnya.", 
                time: "60s" 
            },
            { 
                short: "23. Indikator Sukses", 
                cat: "Closing", 
                q: "Apakah Anda memiliki pertanyaan untuk kami? (Indikator)", 
                a: "Saya ingin mengetahui indikator keberhasilan untuk posisi ini dalam beberapa bulan pertama.\nDengan demikian, saya dapat memahami ekspektasi perusahaan dan menyesuaikan cara kerja saya sejak awal.", 
                time: "30s" 
            },
            { 
                short: "24. Alur Koordinasi", 
                cat: "Closing", 
                q: "Apakah Anda memiliki pertanyaan untuk kami? (Alur)", 
                a: "Saya juga ingin mengetahui alur koordinasi antara tim operasional dan SAP Admin.\nDengan memahami alur tersebut, saya dapat menyesuaikan cara kerja saya.\nHal ini penting untuk menjaga akurasi data.\nDengan cara itu, saya dapat bekerja lebih efektif.", 
                time: "30s" 
            },
            { 
                short: "25. Jenjang Karir", 
                cat: "Closing", 
                q: "Apakah Anda memiliki pertanyaan untuk kami? (Karir/Status)", 
                a: "Saya ingin memahami terkait jenjang karir untuk posisi ini.\nApakah status awalnya bersifat kontrak atau langsung karyawan tetap?\nJika kontrak, biasanya seperti apa kriteria atau evaluasi agar dapat menjadi karyawan tetap?\n\n\"Kenapa Anda ingin menjadi karyawan tetap?\"\nSaya melihat posisi ini sebagai peluang untuk berkembang dalam jangka panjang.\nDalam pengalaman saya, saya selalu berusaha menjaga kualitas kerja agar dapat dipercaya dalam tanggung jawab yang diberikan.\nSaya juga terus meningkatkan cara kerja agar lebih efisien dan konsisten.\nDengan cara itu, saya berharap dapat memberikan kontribusi yang berkelanjutan bagi perusahaan.", 
                time: "30s" 
            },
            { 
                short: "26. Profil Unilever", 
                cat: "Company", 
                q: "Apa yang Anda ketahui tentang PT Unilever Oleochemical Indonesia?", 
                a: "Setahu saya, PT Unilever Oleochemical Indonesia bergerak di bidang pengolahan bahan berbasis minyak nabati yang menjadi bagian dari rantai pasok industri yang lebih luas.\nDalam operasionalnya, pengelolaan data produksi dan stok menjadi hal yang sangat penting untuk menjaga kelancaran proses.\nSaya melihat peran SAP Admin berada pada titik penting dalam memastikan data tersebut akurat dan dapat digunakan oleh tim operasional.\nDengan cara itu, posisi ini berkontribusi langsung dalam menjaga stabilitas dan efisiensi operasional perusahaan.", 
                time: "45s" 
            },
            { 
                short: "27. Gaji", 
                cat: "Misc", 
                q: "Berapa ekspektasi gaji Anda?", 
                a: "Saya terbuka mengikuti standar perusahaan untuk posisi ini.\nFokus utama saya saat ini adalah belajar dan berkembang.\nSaya percaya kontribusi saya dapat berkembang seiring waktu.\nNamun saya tetap terbuka untuk diskusi lebih lanjut.", 
                time: "30s" 
            },
            { 
                short: "28. Masa Lalu", 
                cat: "Refleksi", 
                q: "Jika Anda bisa kembali ke masa lalu, apa yang akan Anda lakukan berbeda?", 
                a: "Saya menyadari pentingnya sistem validasi sejak awal.\nJika saya kembali, saya akan membangun sistem pengecekan lebih cepat.\nHal ini dapat mengurangi kesalahan sejak awal.\nDengan pembelajaran tersebut, saya sekarang lebih sistematis.", 
                time: "45s" 
            },
            { 
                short: "29. Penyesalan", 
                cat: "Refleksi", 
                q: "Apa penyesalan terbesar Anda?", 
                a: "Saya menyadari dulu belum cukup proaktif memperbaiki sistem kerja.\nNamun saya mulai memperbaikinya dengan membuat sistem pencatatan lebih terstruktur.\nHal tersebut membantu efisiensi kerja.\nDengan pengalaman ini, saya sekarang lebih proaktif.", 
                time: "45s" 
            },
            { 
                short: "30. Ulang Intern", 
                cat: "Refleksi", 
                q: "Jika mengulang internship, apa yang Anda lakukan berbeda?", 
                a: "Saya akan lebih cepat memahami alur operasional secara menyeluruh.\nDengan pemahaman itu, saya dapat mengidentifikasi kendala lebih awal.\nHal tersebut membantu perbaikan lebih cepat.\nDengan pengalaman ini, saya lebih siap.", 
                time: "45s" 
            }
        ];

        const navList = document.getElementById('nav-list');
        const emptyView = document.getElementById('empty-view');
        const displayView = document.getElementById('display-view');
        const qText = document.getElementById('q-text');
        const aContainer = document.getElementById('a-container');
        const catLabel = document.getElementById('cat-label');
        const timeLabel = document.getElementById('time-label');

        data.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = item.short;
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                emptyView.classList.add('hidden');
                displayView.classList.remove('hidden');
                
                qText.innerText = item.q;
                catLabel.innerText = item.cat;
                timeLabel.innerText = item.time;

                // Menangani spacing paragraf seperti docx
                aContainer.innerHTML = ''; // Reset kontainer
                const paragraphs = item.a.split('\n'); // Pecah berdasarkan baris baru
                
                paragraphs.forEach(pText => {
                    if (pText.trim() !== '') {
                        const pTag = document.createElement('p');
                        pTag.className = 'paragraph-docx';
                        pTag.innerText = pText;
                        aContainer.appendChild(pTag);
                    } else {
                        // Jika ada baris kosong ganda, beri ruang ekstra
                        const spacer = document.createElement('div');
                        spacer.className = 'h-2';
                        aContainer.appendChild(spacer);
                    }
                });
            };
            navList.appendChild(btn);
        });
    </script>
